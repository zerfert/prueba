version: "3.1"

rules:

- rule: Decir adiós cada vez que el usuario dice adiós
  steps:
  - intent: despedir
  - action: utter_despedir

- rule: Decir que es un robot cada vez que el usuario lo retan
  steps:
  - intent: reto_bot
  - action: utter_reto_bot

- rule: Hacer que el bot de una respuesta ante una intencion de despistar el bot
  steps:
  - intent: despistar
  - action: utter_despistar

- rule: decir el clima cuando se solicita
  steps:
  - intent: clima
  - action: action_clima
  
- rule: mostra contenido cuando se solicita
  steps:
  - intent: documentos
  - action: action_documentos
  
- rule: mostras informacion modelGPT
  steps:
  - intent: info
  - action: action_info
  
- rule: convertir a qr
  steps:
  - intent: qr
  - action: action_qr
  
- rule: convertir a url corta
  steps:
  - intent: url
  - action: action_enlace

- rule: buscar videos
  steps:
  - intent: youtube
  - action: action_youtube